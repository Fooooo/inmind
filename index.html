<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>問心｜InMind</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 落梅粒子canvas -->
<canvas id="plum-canvas"></canvas>

<!-- Tab1: 起卦頁 -->
<div id="tab-qi" class="page active">
  <div class="wenxin" id="wenxin">問心</div>
  <!-- 初始態：氣泡按鈕 -->
  <div class="initial-state" id="qi-initial">
    <div class="bubble-btn" id="ask-btn">所問何事</div>
  </div>
  <!-- 輸入態：標題+輸入框+字數+起卦按鈕 -->
  <div class="input-area" id="qi-input">
    <div class="input-label">請寫下疑問</div>
    <div class="input-wrap">
      <input type="text" class="question-input" id="question-input"
             placeholder="想清疑問並寫下，本就是看清自己，靠近答案"
             autocomplete="off">
      <div class="char-count" id="char-count">0/20</div>
    </div>
    <button class="qigua-btn" id="qigua-btn" disabled>起卦</button>
  </div>
</div>

<!-- Tab2: 卦錄頁 -->
<div id="tab-lu" class="page">
  <div class="empty-state" id="empty-state">暫無卦例記錄</div>
  <div class="record-list" id="record-list"></div>
</div>

<!-- 底部Tab -->
<div class="tab-bar">
  <div class="tab-item active" data-tab="qi">起卦</div>
  <div class="tab-item" data-tab="lu">卦錄</div>
</div>

<!-- 詳情頁 -->
<div id="detail-page">
  <div class="detail-header">
    <button class="back-btn" id="back-btn">‹</button>
    <div class="detail-title">卦象詳情</div>
  </div>
  <div class="detail-content" id="detail-content"></div>
  <div class="detail-footer">
    <div class="detail-btn copy" id="copy-btn">📋 複製</div>
    <div class="detail-btn jiegua" id="jiegua-btn">🌀 解卦</div>
  </div>
</div>

<!-- 儀式感加載 -->
<div class="ritual-overlay" id="ritual-overlay">
  <div class="ritual-text">起卦中</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 彈窗 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-text" id="modal-text"></div>
    <button class="modal-ok" id="modal-ok">知道了</button>
  </div>
</div>

<!-- 數據與邏輯：按依賴順序加載 -->
<script src="data/gua-data.js"></script>
<script src="data/gua-profile.js"></script>
<script src="js/app.js"></script>

</body>
</html>
